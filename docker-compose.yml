# MySQL local para desenvolvimento. Em produção usamos o MySQL da TineHost.
# Suba com:  pnpm db:up   (ou docker compose up -d)
services:
  mysql:
    image: mysql:8.4
    container_name: medconsultoria-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: medconsultoria
      MYSQL_USER: medconsultoria
      MYSQL_PASSWORD: medconsultoria
    ports:
      # Host 3307 -> container 3306 (evita conflito com outros MySQL locais na 3306)
      - "3307:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - medconsultoria_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  medconsultoria_mysql:
